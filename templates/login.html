{% extends "base.html" %}

{% block title %}Login | NurseEducation{% endblock %}

{% block content %}
<div class="login-shell">
  <div class="login-card panel">
    <div class="login-kicker">NURSE EDUCATION</div>
    <h1 class="login-title">Research Login</h1>
    <p class="login-copy">배부받은 아이디로 로그인하거나, 새 아이디를 만들어 시뮬레이션을 시작합니다.</p>

    <form id="loginForm" class="login-form">
      <label class="login-label" for="username">ID</label>
      <input id="username" name="username" type="text" autocomplete="username" placeholder="아이디" required>

      <label class="login-label" for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="비밀번호" required>

      <button id="loginButton" type="submit">로그인</button>
      <button id="registerButton" type="button" class="btn-register">회원가입</button>
      <p id="loginStatus" class="login-status"></p>
    </form>
  </div>
</div>

<style>
.login-shell {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
}

.login-card {
  width: min(460px, 92vw);
  padding: 34px 34px 30px;
}

.login-kicker {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--text-dim);
  margin-bottom: 14px;
}

.login-title {
  font-size: 34px;
  line-height: 1.05;
  margin-bottom: 10px;
}

.login-copy {
  color: var(--text-dim);
  line-height: 1.7;
  margin-bottom: 22px;
}

.login-form {
  display: grid;
  gap: 12px;
}

.login-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  text-transform: uppercase;
}

.login-form input {
  width: 100%;
  font-family: var(--sans);
  font-size: 15px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(0,220,130,0.25);
  border-radius: 10px;
  color: var(--text);
  padding: 12px 14px;
  outline: none;
}

.login-form input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 2px rgba(0,220,130,0.12);
}

.login-form button {
  margin-top: 4px;
  height: 46px;
}

.btn-register {
  background: transparent;
  border: 1px solid rgba(0,220,130,0.25);
  color: var(--text-dim);
}
.btn-register:hover {
  background: rgba(0,220,130,0.08);
  color: var(--green);
}

.login-status {
  min-height: 22px;
  font-size: 13px;
  color: var(--text-dim);
}

.login-status.error {
  color: var(--red);
}

.login-status.success {
  color: var(--green);
}
</style>

<script>
const loginForm = document.getElementById("loginForm");
const loginButton = document.getElementById("loginButton");
const registerButton = document.getElementById("registerButton");
const loginStatus = document.getElementById("loginStatus");

async function authRequest(endpoint) {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  if (!username || !password) {
    loginStatus.className = "login-status error";
    loginStatus.innerText = "아이디와 비밀번호를 입력해 주세요.";
    return;
  }

  loginButton.disabled = true;
  registerButton.disabled = true;
  loginStatus.className = "login-status";
  loginStatus.innerText = "처리 중...";

  try {
    const res = await fetch(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });

    const payload = await res.json();
    if (!res.ok) {
      throw new Error(payload.error || "요청 처리에 실패했습니다.");
    }

    loginStatus.className = "login-status success";
    loginStatus.innerText = "로그인 성공!";
    window.location.href = "/";
  } catch (error) {
    loginStatus.className = "login-status error";
    loginStatus.innerText = error.message || "오류가 발생했습니다.";
  } finally {
    loginButton.disabled = false;
    registerButton.disabled = false;
  }
}

loginForm.addEventListener("submit", (event) => {
  event.preventDefault();
  authRequest("/auth/login");
});

registerButton.addEventListener("click", () => {
  authRequest("/auth/register");
});
</script>
{% endblock %}
