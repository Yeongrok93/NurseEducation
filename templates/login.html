{% extends "base.html" %}

{% block title %}Login | NurseEducation{% endblock %}

{% block content %}
<div class="login-shell">
  <div class="login-card panel">
    <div class="login-kicker">NURSE EDUCATION</div>
    <h1 class="login-title">Research Login</h1>
    <p class="login-copy">배부받은 계정으로 로그인한 뒤 시뮬레이션을 시작합니다.</p>

    <form id="loginForm" class="login-form">
      <label class="login-label" for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="username" required>

      <label class="login-label" for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button id="loginButton" type="submit">Login</button>
      <p id="loginStatus" class="login-status"></p>
    </form>
  </div>
</div>

<style>
.login-shell {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
}

.login-card {
  width: min(460px, 92vw);
  padding: 34px 34px 30px;
}

.login-kicker {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--text-dim);
  margin-bottom: 14px;
}

.login-title {
  font-size: 34px;
  line-height: 1.05;
  margin-bottom: 10px;
}

.login-copy {
  color: var(--text-dim);
  line-height: 1.7;
  margin-bottom: 22px;
}

.login-form {
  display: grid;
  gap: 12px;
}

.login-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text-dim);
  text-transform: uppercase;
}

.login-form input {
  width: 100%;
  font-family: var(--sans);
  font-size: 15px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(0,220,130,0.25);
  border-radius: 10px;
  color: var(--text);
  padding: 12px 14px;
  outline: none;
}

.login-form input:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 2px rgba(0,220,130,0.12);
}

.login-form button {
  margin-top: 8px;
  height: 46px;
}

.login-status {
  min-height: 22px;
  font-size: 13px;
  color: var(--text-dim);
}

.login-status.error {
  color: var(--red);
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseClient = window.supabase.createClient("{{ supabase_url }}", "{{ supabase_anon_key }}");
const loginForm = document.getElementById("loginForm");
const loginButton = document.getElementById("loginButton");
const loginStatus = document.getElementById("loginStatus");

loginForm.addEventListener("submit", async (event) => {
  event.preventDefault();
  loginButton.disabled = true;
  loginStatus.classList.remove("error");
  loginStatus.innerText = "Signing in...";

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;

  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) throw error;

    const accessToken = data.session?.access_token;
    if (!accessToken) throw new Error("No access token returned.");

    const res = await fetch("/auth/session", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ access_token: accessToken }),
    });

    const payload = await res.json();
    if (!res.ok) {
      throw new Error(payload.error || "Session sync failed.");
    }

    window.location.href = "/";
  } catch (error) {
    loginStatus.classList.add("error");
    loginStatus.innerText = error.message || "Login failed.";
  } finally {
    loginButton.disabled = false;
  }
});
</script>
{% endblock %}
