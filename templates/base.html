<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}ICU Simulation{% endblock %}</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

/* ── 색상 변수 ── */
:root {
  --bg:          #0a0e14;
  --panel:       rgba(13,20,30,0.82);
  --border:      rgba(0,220,130,0.18);
  --green:       #00dc82;
  --green-dim:   #00a860;
  --red:         #ff4d6a;
  --yellow:      #ffc947;
  --blue:        #4da6ff;
  --text:        #d4e8d8;
  --text-dim:    rgba(212,232,216,0.45);
  --mono:        'Share Tech Mono', monospace;
  --sans:        'Noto Sans KR', sans-serif;
  --radius:      12px;
}

/* ── 리셋 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  min-height: 100vh;

  /* 배경 이미지 위에 어두운 오버레이 */
  background-image:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,180,100,0.06) 0%, transparent 70%),
    url("https://raw.githubusercontent.com/Yeongrok93/NurseEducation/main/static/image/background.png");
  background-size: cover;
  background-attachment: fixed;
  background-position: center;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(5,10,16,0.72);
  z-index: 0;
  pointer-events: none;
}

/* ── 패널 공통 ── */
.panel {
  position: relative;
  z-index: 1;
  background: var(--panel);
  backdrop-filter: blur(14px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
}

/* ── 버튼 ── */
button {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  padding: 9px 16px;
  border: 1px solid var(--green-dim);
  border-radius: 8px;
  background: rgba(0,180,100,0.12);
  color: var(--green);
  cursor: pointer;
  letter-spacing: 0.03em;
  transition: background 0.15s, box-shadow 0.15s;
}
button:hover {
  background: rgba(0,220,130,0.22);
  box-shadow: 0 0 12px rgba(0,220,130,0.25);
}

/* ── textarea ── */
textarea {
  font-family: var(--sans);
  font-size: 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(0,220,130,0.25);
  border-radius: 8px;
  color: var(--text);
  padding: 10px 12px;
  resize: none;
  outline: none;
  transition: border-color 0.2s;
}
textarea:focus {
  border-color: var(--green);
  box-shadow: 0 0 0 2px rgba(0,220,130,0.12);
}
textarea::placeholder { color: var(--text-dim); }

/* ── 스크롤바 ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 4px; }

/* ── 모달 ── */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
.modal.open { display: flex; }

.modal-content {
  background: #0d1720;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 32px;
  width: 400px;
  max-width: 90vw;
  font-family: var(--mono);
  color: var(--green);
  position: relative;
}
.modal-content h3 {
  font-size: 13px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 16px;
}
.modal-content .val-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid rgba(0,220,130,0.08);
  font-size: 15px;
}
.modal-content .val-label { color: var(--text-dim); font-size: 12px; }
.modal-content .val-num   { color: var(--green); font-weight: bold; }

.modal-close {
  position: absolute;
  top: 14px; right: 16px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  line-height: 1;
}
.modal-close:hover { color: var(--red); background: transparent; box-shadow: none; }

</style>

</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
